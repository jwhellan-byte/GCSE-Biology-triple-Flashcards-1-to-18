<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>AQA GCSE Biology (Full) — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg:#0c0e14;--bg2:#13161f;--bg3:#1a1e2c;--border:#252a3b;--border2:#2f3650;
  --text:#e4e8f5;--muted:#6a7494;--muted2:#4a5270;
  --accent:#2ed87a;--accent-bg:rgba(46,216,122,.10);
  --teal:#22c5b0;--teal-bg:rgba(34,197,176,.10);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,.10);
  --red:#f06060;
  --card-q:linear-gradient(160deg,#161b2e 0%,#111420 100%);
  --card-a:linear-gradient(160deg,#0e1e17 0%,#0a1510 100%);
  --shadow:0 4px 24px rgba(0,0,0,.55);
}
[data-theme="light"] {
  --bg:#f5f6fa;--bg2:#ffffff;--bg3:#eceef6;--border:#d8dcea;--border2:#c4c9df;
  --text:#1a1e2e;--muted:#7a82a0;--muted2:#9fa7c2;
  --accent:#1a9e52;--accent-bg:rgba(26,158,82,.08);
  --teal:#0f8a7a;--teal-bg:rgba(15,138,122,.08);
  --amber:#d9890e;--amber-bg:rgba(217,137,14,.08);
  --red:#d94040;
  --card-q:linear-gradient(160deg,#f0f3ff 0%,#e8ecfa 100%);
  --card-a:linear-gradient(160deg,#eafaf3 0%,#dff5eb 100%);
  --shadow:0 2px 12px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── iOS Safari: prevent bounce/elastic scroll causing layout glitches ── */
html{
  scroll-behavior:smooth;
  /* Prevent iOS text size adjustment on orientation change */
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
  min-height:-webkit-fill-available; /* iOS Safari full-height fix */
  transition:background .25s,color .25s;
  /* Prevent horizontal overflow on mobile */
  overflow-x:hidden;
  /* Smooth momentum scrolling on iOS */
  -webkit-overflow-scrolling:touch;
}

/* ── Header ── */
header{
  position:sticky;
  /* iOS Safari sticky fix — use -webkit-sticky */
  position:-webkit-sticky;
  position:sticky;
  top:0;z-index:200;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  /* Safe area padding for iPhone notch */
  padding:0 max(20px, env(safe-area-inset-right)) 0 max(20px, env(safe-area-inset-left));
  display:flex;align-items:center;gap:10px;
  height:58px;
  /* Prevent iOS from making header translucent */
  -webkit-backdrop-filter:none;
}
.logo{font-family:'Instrument Serif',serif;font-size:1.1rem;color:var(--text);white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.header-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
#gp-wrap{flex:1;min-width:0;max-width:200px;display:flex;flex-direction:column;gap:4px}
#gp-bg{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden}
#gp-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--teal));transition:width .4s;width:0%}
#gp-text{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbtn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;border-radius:8px;
  font-family:'Syne',sans-serif;font-size:.75rem;font-weight:500;
  padding:6px 14px;transition:all .15s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
  /* iOS: remove default button styling */
  -webkit-appearance:none;appearance:none;
  touch-action:manipulation; /* removes 300ms tap delay */
}
.hbtn:hover{border-color:var(--accent);color:var(--text)}
/* Use :active for touch feedback instead of :hover */
.hbtn:active{border-color:var(--accent);color:var(--text);opacity:.8}
#theme-btn{
  width:44px;height:44px;padding:0; /* 44px = Apple minimum touch target */
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
  -webkit-appearance:none;appearance:none;
  touch-action:manipulation;
}

/* ── Selection panel ── */
#sel-panel{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:12px max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
  display:flex;flex-wrap:wrap;align-items:center;gap:8px;
  /* Prevent horizontal scroll on iOS */
  overflow-x:hidden;
}
.sel-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center;width:100%}
.sel-label{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap;margin-right:2px}
.sel-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;border-radius:7px;
  font-family:'Syne',sans-serif;font-size:.72rem;font-weight:500;
  /* Minimum 44px tall for iOS touch targets */
  padding:10px 12px;
  min-height:38px;
  transition:background .15s,border-color .15s,color .15s;
  white-space:nowrap;
  -webkit-appearance:none;appearance:none;
  touch-action:manipulation;
}
.sel-btn:active{opacity:.75}
.sel-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.sel-btn.p1.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.sel-btn.p2.active{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
.sel-sep{display:none} /* Hide vertical separator — not needed on mobile-first layout */
#shuffle-btn{
  background:var(--accent-bg);border:1px solid var(--accent);
  color:var(--accent);cursor:pointer;border-radius:8px;
  font-family:'Syne',sans-serif;font-size:.75rem;font-weight:600;
  padding:10px 16px;min-height:38px;
  transition:all .15s;display:flex;align-items:center;gap:6px;
  -webkit-appearance:none;appearance:none;
  touch-action:manipulation;
}
#shuffle-btn:active{background:var(--accent);color:#fff}

/* ── Cards area ── */
#cards-area{
  flex:1;
  padding:20px max(16px, env(safe-area-inset-right)) 90px max(16px, env(safe-area-inset-left));
  max-width:1200px;width:100%;margin:0 auto;
}
.ch-section{margin-bottom:40px}
.ch-header{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:16px;padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.ch-num-tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:500;color:var(--accent);background:var(--accent-bg);border:1px solid rgba(46,216,122,.25);padding:3px 8px;border-radius:5px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.paper-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.paper-tag.p1{color:var(--amber);background:var(--amber-bg);border:1px solid rgba(245,166,35,.25)}
.paper-tag.p2{color:var(--teal);background:var(--teal-bg);border:1px solid rgba(34,197,176,.25)}
.ch-title{font-family:'Instrument Serif',serif;font-size:1.15rem;color:var(--text);letter-spacing:-.01em;flex:1;min-width:0}
.ch-stats{
  /* On mobile move stats below title */
  font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);
  text-align:right;white-space:nowrap;flex-shrink:0;
}
.ch-prog{width:60px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.ch-prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s}

/* ── Cards grid ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

/* ── Individual card ──
   KEY iOS FIX: iOS Safari has a well-known bug with 3D transforms and
   backface-visibility. The fix is to use translateZ(0) to force GPU
   compositing and ensure -webkit- prefixes are on BOTH the container
   AND the face elements. Also, remove :hover lift on touch devices
   to prevent cards getting "stuck" in raised state after tap.
── */
.card-wrap{
  perspective:1000px;
  -webkit-perspective:1000px;
  height:195px;
  cursor:pointer;
  touch-action:manipulation; /* prevents double-tap zoom, removes tap delay */
  /* Isolate stacking context for iOS */
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
}
.card-wrap.tall{height:240px}

.card-inner{
  width:100%;height:100%;
  position:relative;
  -webkit-transform-style:preserve-3d;
  transform-style:preserve-3d;
  transition:-webkit-transform .5s cubic-bezier(.4,0,.2,1);
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  /* Force GPU layer on iOS */
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
  will-change:transform;
}
/* Only apply hover lift on devices that truly have hover (desktops) */
@media(hover:hover){
  .card-wrap:hover .card-inner:not(.flipped){
    -webkit-transform:translateY(-2px);
    transform:translateY(-2px);
  }
}
.card-inner.flipped{
  -webkit-transform:rotateY(180deg);
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;inset:0;
  /* Critical iOS fix: must use BOTH prefixed and unprefixed */
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
  border-radius:12px;
  padding:16px 18px;
  display:flex;flex-direction:column;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  /* Force GPU compositing on iOS — prevents face bleed-through */
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
}
.cf-front{background:var(--card-q)}
.cf-back{
  background:var(--card-a);
  border-color:rgba(52,201,126,.2);
  -webkit-transform:rotateY(180deg) translateZ(0);
  transform:rotateY(180deg) translateZ(0);
}
.card-wrap.is-learned .cf-front{border-color:rgba(52,201,126,.35)}

.card-topic-tag{font-family:'JetBrains Mono',monospace;font-size:.57rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;flex-shrink:0}
.card-q-text{font-family:'Instrument Serif',serif;font-size:1.2rem;line-height:1.5;color:var(--text);flex:1;overflow:hidden}
.card-back-label{font-family:'JetBrains Mono',monospace;font-size:.57rem;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;opacity:.7;flex-shrink:0}
.card-a-text{font-family:'Instrument Serif',serif;font-size:1.15rem;line-height:1.45;color:#7ee8b0;flex:1;display:flex;align-items:center;overflow:hidden}
[data-theme="light"] .card-a-text{color:#0d7a45}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-shrink:0}
.card-hint{font-size:.58rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}

/* Learned button: 44×44 touch target (Apple HIG requirement) */
.learned-btn{
  width:44px;height:44px;
  border-radius:50%;
  border:1.5px solid var(--border2);
  background:transparent;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
  transition:background .18s,border-color .18s,color .18s;
  flex-shrink:0;
  color:var(--muted2);
  margin:-9px -9px -9px 0; /* visual size stays small, tap area is 44px */
  -webkit-appearance:none;appearance:none;
  touch-action:manipulation;
}
.learned-btn:active{border-color:var(--accent);color:var(--accent);opacity:.7}
.learned-btn.is-learned{
  background:var(--teal);border-color:var(--teal);
  color:#fff;box-shadow:0 0 0 3px var(--teal-bg);
}

/* ── Empty state ── */
#empty-msg{display:none;text-align:center;padding:60px 20px}
#empty-msg h2{font-family:'Instrument Serif',serif;font-size:1.6rem;color:var(--muted);margin-bottom:8px}
#empty-msg p{font-size:.85rem;color:var(--muted2)}

/* ── Summary bar — safe area aware ── */
#sum-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:var(--bg2);
  border-top:1px solid var(--border);
  /* Account for iPhone home indicator / safe area */
  padding:10px max(16px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
}
.sum-item{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.sum-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sum-dot.green{background:var(--accent)}.sum-dot.teal{background:var(--teal)}
#reset-btn{
  margin-left:auto;background:none;
  border:1px solid var(--border);color:var(--muted);cursor:pointer;
  border-radius:7px;font-family:'Syne',sans-serif;font-size:.7rem;font-weight:500;
  padding:8px 12px;min-height:36px;
  transition:all .15s;
  -webkit-appearance:none;appearance:none;
  touch-action:manipulation;
}
#reset-btn:active{border-color:var(--red);color:var(--red)}

/* ── Scrollbar (desktop only) ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ══ RESPONSIVE BREAKPOINTS ══════════════════════════════════ */

/* Small phones (iPhone SE, 375px wide) */
@media(max-width:400px){
  .logo{font-size:.95rem}
  #gp-wrap{max-width:130px}
  #gp-text{font-size:.52rem}
  .ch-title{font-size:1rem}
  .card-q-text{font-size:1.1rem}
  .card-a-text{font-size:1.05rem}
}

/* All phones */
@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr}
  .sel-group{width:100%}
  #shuffle-btn{width:100%;justify-content:center}
  .ch-title{font-size:1.05rem}
  /* Stack ch-header on narrow screens */
  .ch-header{flex-wrap:wrap}
  .ch-stats{width:100%;text-align:left;display:flex;align-items:center;gap:8px}
  .ch-prog{width:80px;margin-top:0}
  /* Increase card height slightly on mobile for readability */
  .card-wrap{height:210px}
  .card-wrap.tall{height:260px}
}

/* Tablets */
@media(min-width:601px) and (max-width:900px){
  .cards-grid{grid-template-columns:repeat(2,1fr)}
}

/* Landscape iPhone — reduce card height slightly */
@media(max-height:500px) and (max-width:900px){
  .card-wrap{height:180px}
  .card-wrap.tall{height:210px}
  header{height:48px}
  #cards-area{padding-top:12px}
}
</style>
<body>
<header>
  <div class="logo">AQA Bio <span>Triple Biology</span></div>
  <div class="header-sep"></div>
  <div id="gp-wrap"><div id="gp-bg"><div id="gp-bar"></div></div><div id="gp-text">0 of 0 learned</div></div>
  <button class="hbtn" id="theme-btn" title="Toggle dark/light mode">🌙</button>
</header>
<div id="sel-panel">
  <div class="sel-group">
    <span class="sel-label">Paper</span>
    <button class="sel-btn p1" data-action="paper1">📄 Paper 1 (Ch 1–9)</button>
    <button class="sel-btn p2" data-action="paper2">📄 Paper 2 (Ch 10–18)</button>
    <button class="sel-btn" data-action="all">All Chapters</button>
  </div>
  <div class="sel-group" id="ch-toggles">
    <span class="sel-label">Chapters</span>
  </div>
  <button id="shuffle-btn">⇄ Shuffle Order</button>
</div>
<div id="cards-area">
  <div id="empty-msg">
    <h2>Select chapters above ↑</h2>
    <p>Choose Paper 1, Paper 2, All Chapters, or pick individual chapters.</p>
  </div>
  <div id="ch-container"></div>
</div>
<div id="sum-bar">
  <div class="sum-item"><div class="sum-dot green"></div><span id="sum-shown">0 cards shown</span></div>
  <div class="sum-item"><div class="sum-dot teal"></div><span id="sum-learned">0 learned</span></div>
  <button id="reset-btn">↺ Reset visible</button>
</div>

<script>
/* ═══════════════════════════ DATA ═══════════════════════════ */
const CHAPTERS=[
/* ── CHAPTER 1 ── */
{id:"ch1",num:"Ch 1",paper:1,title:"Cell Structure & Transport",cards:[
{t:"1.1 Microscopy",q:"How many mm in a metre?",a:"1,000"},
{t:"1.1 Microscopy",q:"What is the highest magnification you can achieve with a light microscope?",a:"×2,000"},
{t:"1.1 Microscopy",q:"What is the highest magnification you can achieve with an electron microscope?",a:"×2,000,000"},
{t:"1.1 Microscopy",q:"If an eyepiece lens is ×5 and the objective lens is ×10, what is the overall magnification?",a:"×50"},
{t:"1.1 Microscopy",q:"Give one reason to use a light microscope rather than an electron microscope.",a:"Cheaper and easier to use"},
{t:"1.1 Microscopy",q:"Give one reason to use an electron microscope rather than a light microscope.",a:"See in more detail — higher resolution"},
{t:"1.2 Cell Parts",q:"What is the role of the cell membrane?",a:"Controls passage of substances in and out of cells"},
{t:"1.2 Cell Parts",q:"What is the role of the cell wall?",a:"Supports and strengthens plant and bacteria cells"},
{t:"1.2 Cell Parts",q:"What is the role of mitochondria?",a:"Site of aerobic respiration"},
{t:"1.2 Cell Parts",q:"What is the role of chloroplasts?",a:"Absorb light for photosynthesis"},
{t:"1.2 Cell Parts",q:"What is the role of ribosomes?",a:"Making new proteins (protein synthesis)"},
{t:"1.2 Cell Parts",q:"Which part of plant cells is made from cellulose?",a:"The cell wall"},
{t:"1.3 Prokaryotes",q:"Prokaryotic cells don't contain a true _______?",a:"Nucleus"},
{t:"1.3 Prokaryotes",q:"What do some bacteria use flagella for?",a:"Movement"},
{t:"1.3 Prokaryotes",q:"How many micrometres (µm) in a mm?",a:"1,000"},
{t:"1.3 Prokaryotes",q:"Which is smaller, a virus or bacteria?",a:"A virus"},
{t:"1.3 Prokaryotes",q:"If an object is 1,000 times bigger than something else, how many orders of magnitude is that?",a:"3"},
{t:"1.3 Prokaryotes",q:"The genetic material in cells is made from a chemical called…?",a:"DNA"},
{t:"1.4 Specialised Cells",q:"What is the role of nerve cells?",a:"Carry electrical impulses around the body"},
{t:"1.4 Specialised Cells",q:"What is the role of red blood cells?",a:"Carry oxygen to cells in the body"},
{t:"1.4 Specialised Cells",q:"What is the role of muscle cells?",a:"Contract and relax to provide movement"},
{t:"1.4 Specialised Cells",q:"What is the role of sperm cells?",a:"Fertilise an egg cell; carry the male's DNA"},
{t:"1.4 Specialised Cells",q:"What is the role of white blood cells?",a:"Destroy pathogens inside the body"},
{t:"1.4 Specialised Cells",q:"In an embryo, all cells start the same and then differentiate. What does this mean?",a:"Form different types of specialised cells"},
{t:"1.5 Plant Cells",q:"What is the role of root hair cells?",a:"Absorb water and dissolved minerals from the soil"},
{t:"1.5 Plant Cells",q:"Why do root hair cells have a large surface area?",a:"So they can absorb water and dissolved minerals quickly"},
{t:"1.5 Plant Cells",q:"What is the role of xylem cells?",a:"Transport water from the roots to the leaves"},
{t:"1.5 Plant Cells",q:"What is the role of phloem cells?",a:"Transport dissolved food (sugars) from leaves to the rest of the plant"},
{t:"1.5 Plant Cells",q:"Xylem has strands of lignin wrapped around it. What does the lignin do?",a:"Strengthens the xylem"},
{t:"1.5 Plant Cells",q:"What is the name of the green chemical found inside chloroplasts?",a:"Chlorophyll"},
{t:"1.6 Diffusion",q:"What does diffusion mean?",a:"Spreading out of particles from a high to a low concentration until even"},
{t:"1.6 Diffusion",q:"True or False — when a gas or liquid has spread out, the particles stop moving.",a:"FALSE — particles never stop moving"},
{t:"1.6 Diffusion",q:"Why do some cells have a large surface area?",a:"To absorb substances quickly"},
{t:"1.6 Diffusion",q:"Does increasing the temperature increase or decrease the rate of diffusion?",a:"Increase"},
{t:"1.6 Diffusion",q:"Does increasing the concentration gradient increase or decrease the rate of diffusion?",a:"Increase"},
{t:"1.6 Diffusion",q:"Which gas diffuses out of the blood and into the lungs?",a:"Carbon dioxide"},
{t:"1.7 Osmosis",q:"Osmosis is the movement of water from a dilute to a more concentrated solution through a partially permeable _______?",a:"Membrane"},
{t:"1.7 Osmosis",q:"Will a piece of potato placed in pure water gain or lose mass?",a:"Gain"},
{t:"1.7 Osmosis",q:"Does hypertonic mean 'less' or 'more' concentrated?",a:"More concentrated"},
{t:"1.7 Osmosis",q:"What part of a cell stops plant cells from bursting in water?",a:"Cell wall"},
{t:"1.7 Osmosis",q:"What is the liquid part of a cell called?",a:"Cytoplasm"},
{t:"1.7 Osmosis",q:"Which word beginning with 'D' means 'not very concentrated'?",a:"Dilute"},
{t:"1.8 Experiments",q:"Does hypotonic mean 'less' or 'more' concentrated?",a:"Less concentrated"},
{t:"1.8 Experiments",q:"Which word beginning with 'I', sometimes used on sports drinks, means 'the same concentration'?",a:"Isotonic"},
{t:"1.8 Experiments",q:"In an experiment, is the variable that you change yourself the independent or the dependent variable?",a:"Independent"},
{t:"1.8 Experiments",q:"What is the name for variables in the experiment that you keep the same each time?",a:"Control variables"},
{t:"1.8 Experiments",q:"What word beginning with 'A' means a result that does not appear to fit a pattern?",a:"Anomalous"},
{t:"1.8 Experiments",q:"Which variable always goes in the first column of a table and along the bottom of a graph?",a:"Independent variable"},
{t:"1.9 Active Transport",q:"Active transport moves molecules _______ a concentration gradient.",a:"Against"},
{t:"1.9 Active Transport",q:"Root hair cells absorb dissolved _______ from the soil using active transport.",a:"Minerals / mineral ions"},
{t:"1.9 Active Transport",q:"Active transport needs _______ to move molecules.",a:"Energy"},
{t:"1.9 Active Transport",q:"Sugar is absorbed using active transport in our digestive system by which organ?",a:"Small intestine"},

{id:"ch14",num:"Ch 14",paper:2,title:"Variation & Evolution",cards:[
{t:"14.1 Variation",q:"Which type of variation depends on nature?",a:"Genetic"},
{t:"14.1 Variation",q:"Which type of variation depends on nurture?",a:"Environmental"},

{t:"14.1 Variation",q:"What do genes control?",a:"The physical characteristics that develop"},

{t:"14.2 Evolution",q:"What is the process called that means better adapted individuals are more likely to survive?",a:"Natural selection"},
{t:"14.2 Evolution",q:"Not all members of a population are the same. What happens to give rise to differences?",a:"Chance mutation"},

{t:"14.2 Evolution",q:"Which 'A' means versions of a gene?",a:"Alleles"},
{t:"14.2 Evolution",q:"If two organisms cannot breed and produce fertile offspring they are different s_______.",a:"Species"},

{t:"14.4 Genetic Engineering",q:"What 'P' is the name of the rings of DNA found in bacteria?",a:"Plasmid"},
{t:"14.4 Genetic Engineering",q:"What does the 'GM' in GM crops stand for?",a:"Genetically Modified"},
{t:"14.5 Cloning",q:"A clone is a _______ identical organism.",a:"Genetically"},
{t:"14.5 Cloning",q:"Plants can be cloned using t_______ c_______.",a:"Tissue culture"},
{t:"14.5 Cloning",q:"What characteristics may be selected when cloning animals?",a:"High yield e.g. milk, wool, meat, or appearance"},

{t:"14.6 Adult Cell Cloning",q:"Where does the cloned animal embryo develop?",a:"Uterus / womb of a surrogate"},

{t:"14.7 GM Debate",q:"What is the scientific term for genetically identical organisms?",a:"Clones"},
{t:"14.7 GM Debate",q:"Why is there an increasing need for higher yield crops?",a:"Higher population / more people to feed"},

/* ═══════════════════════════ APP LOGIC ═══════════════════════════ */
const p1ids=CHAPTERS.filter(c=>c.paper===1).map(c=>c.id);
const p2ids=CHAPTERS.filter(c=>c.paper===2).map(c=>c.id);
let sel=new Set();
let orders={};
let learned=new Set();
let dark=true;

function ck(chId,idx){return chId+'_'+idx;}
function saveL(){try{localStorage.setItem('bio_full_learned',JSON.stringify([...learned]));}catch(e){}}
function loadL(){try{const d=localStorage.getItem('bio_full_learned');if(d)learned=new Set(JSON.parse(d));}catch(e){}}
function saveTh(){try{localStorage.setItem('bio_full_theme',dark?'dark':'light');}catch(e){}}
function loadTh(){try{const t=localStorage.getItem('bio_full_theme');if(t){dark=t==='dark';apply();}}catch(e){}}
function apply(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
}

function getOrder(chId){
  if(!orders[chId]){const ch=CHAPTERS.find(c=>c.id===chId);orders[chId]=[...Array(ch.cards.length).keys()];}
  return orders[chId];
}
function shuffleAll(){
  CHAPTERS.filter(c=>sel.has(c.id)).forEach(ch=>{
    const a=getOrder(ch.id);for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  });
  renderAll();
}

function setSel(ids){
  sel=new Set(ids);
  document.querySelectorAll('.sel-btn[data-chid]').forEach(b=>{b.classList.toggle('active',sel.has(b.dataset.chid));});
  renderAll();
}
function toggleCh(id){
  sel.has(id)?sel.delete(id):sel.add(id);
  const b=document.querySelector(`.sel-btn[data-chid="${id}"]`);
  if(b)b.classList.toggle('active',sel.has(id));
  renderAll();
}

function renderAll(){
  const con=document.getElementById('ch-container');
  const empty=document.getElementById('empty-msg');
  con.innerHTML='';
  if(sel.size===0){empty.style.display='block';updateSummary();return;}
  empty.style.display='none';
  CHAPTERS.filter(c=>sel.has(c.id)).forEach(ch=>{con.appendChild(buildSection(ch));});
  updateSummary();updateGP();
}

function buildSection(ch){
  const ord=getOrder(ch.id);
  const tot=ch.cards.length;
  const lrn=ord.filter(i=>learned.has(ck(ch.id,i))).length;
  const pct=tot?Math.round(lrn/tot*100):0;
  const sec=document.createElement('div');
  sec.className='ch-section';
  const ptag=ch.paper===1?'p1':'p2';
  sec.innerHTML=`
    <div class="ch-header">
      <span class="ch-num-tag">${ch.num}</span>
      <span class="paper-tag ${ptag}">Paper ${ch.paper}</span>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-stats">
        <span id="cst_${ch.id}">${lrn}/${tot} learned</span>
        <div class="ch-prog"><div class="ch-prog-fill" id="cpf_${ch.id}" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="cards-grid" id="grid_${ch.id}"></div>`;
  const grid=sec.querySelector('#grid_'+ch.id);
  ord.forEach(idx=>grid.appendChild(buildCard(ch,idx)));
  return sec;
}

function buildCard(ch,idx){
  const c=ch.cards[idx];
  const key=ck(ch.id,idx);
  const isL=learned.has(key);
  const long=(c.q.length+c.a.length)>150;
  const wrap=document.createElement('div');
  wrap.className='card-wrap'+(long?' tall':'')+(isL?' is-learned':'');
  wrap.id='cw_'+ch.id+'_'+idx;
  wrap.innerHTML=`
    <div class="card-inner" id="ci_${ch.id}_${idx}">
      <div class="card-face cf-front">
        <div class="card-topic-tag">${c.t}</div>
        <div class="card-q-text">${c.q}</div>
        <div class="card-footer">
          <span class="card-hint">tap to reveal →</span>
          <button class="learned-btn${isL?' is-learned':''}" id="lb_${ch.id}_${idx}" onclick="event.stopPropagation();tL('${ch.id}',${idx})" title="${isL?'Unmark':'Mark as learned'}">${isL?'✓':'○'}</button>
        </div>
      </div>
      <div class="card-face cf-back">
        <div class="card-back-label">answer</div>
        <div class="card-a-text">${c.a}</div>
        <div class="card-footer">
          <span class="card-hint">← tap to flip back</span>
          <button class="learned-btn${isL?' is-learned':''}" onclick="event.stopPropagation();tL('${ch.id}',${idx})" title="${isL?'Unmark':'Mark as learned'}">${isL?'✓':'○'}</button>
        </div>
      </div>
    </div>`;
  wrap.addEventListener('click',()=>{document.getElementById('ci_'+ch.id+'_'+idx).classList.toggle('flipped');});
  return wrap;
}

function tL(chId,idx){
  const key=ck(chId,idx);
  learned.has(key)?learned.delete(key):learned.add(key);
  saveL();
  const isL=learned.has(key);
  const wrap=document.getElementById('cw_'+chId+'_'+idx);
  if(wrap){
    wrap.classList.toggle('is-learned',isL);
    wrap.querySelectorAll('.learned-btn').forEach(b=>{b.classList.toggle('is-learned',isL);b.textContent=isL?'✓':'○';});
  }
  updateChProg(chId);updateSummary();updateGP();
}

function updateChProg(chId){
  const ch=CHAPTERS.find(c=>c.id===chId);if(!ch)return;
  const ord=getOrder(chId);
  const tot=ch.cards.length;
  const lrn=ord.filter(i=>learned.has(ck(chId,i))).length;
  const pf=document.getElementById('cpf_'+chId);if(pf)pf.style.width=(tot?lrn/tot*100:0)+'%';
  const st=document.getElementById('cst_'+chId);if(st)st.textContent=lrn+'/'+tot+' learned';
}

function updateSummary(){
  let ts=0,tl=0;
  CHAPTERS.filter(c=>sel.has(c.id)).forEach(ch=>{
    const o=getOrder(ch.id);ts+=o.length;tl+=o.filter(i=>learned.has(ck(ch.id,i))).length;
  });
  document.getElementById('sum-shown').textContent=ts+' cards shown';
  document.getElementById('sum-learned').textContent=tl+' learned';
}

function updateGP(){
  let tot=0,lrn=0;
  CHAPTERS.forEach(ch=>{ch.cards.forEach((_,i)=>{tot++;if(learned.has(ck(ch.id,i)))lrn++;});});
  document.getElementById('gp-bar').style.width=(tot?lrn/tot*100:0)+'%';
  document.getElementById('gp-text').textContent=lrn+' of '+tot+' learned (all chapters)';
}

function resetVisible(){
  CHAPTERS.filter(c=>sel.has(c.id)).forEach(ch=>ch.cards.forEach((_,i)=>learned.delete(ck(ch.id,i))));
  saveL();renderAll();
}

function buildToggles(){
  const w=document.getElementById('ch-toggles');
  CHAPTERS.forEach(ch=>{
    const b=document.createElement('button');
    b.className='sel-btn';b.dataset.chid=ch.id;
    b.textContent=ch.num;b.title=ch.title;
    b.onclick=()=>toggleCh(ch.id);
    w.appendChild(b);
  });
}

document.querySelector('[data-action="paper1"]').onclick=()=>setSel(p1ids);
document.querySelector('[data-action="paper2"]').onclick=()=>setSel(p2ids);
document.querySelector('[data-action="all"]').onclick=()=>setSel(CHAPTERS.map(c=>c.id));
document.getElementById('shuffle-btn').onclick=shuffleAll;
document.getElementById('theme-btn').onclick=()=>{dark=!dark;apply();saveTh();};
document.getElementById('reset-btn').onclick=resetVisible;

loadL();loadTh();buildToggles();updateGP();
document.getElementById('empty-msg').style.display='block';
</script>
</body>
</html>
